<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
</head>
<body style="margin:0;padding:0;background:#f3f5f7;font-family:Arial,Helvetica,sans-serif;color:#1f2937;">
    <table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background:#f3f5f7;padding:24px 12px;">
        <tr>
            <td align="center">
                <table role="presentation" width="600" cellspacing="0" cellpadding="0" border="0" style="max-width:600px;width:100%;background:#ffffff;border:1px solid #e5e7eb;border-radius:12px;overflow:hidden;">
                    <tr>
                        <td style="background:#0f172a;padding:20px 24px;">
                            <h1 style="margin:0;font-size:22px;line-height:1.3;color:#ffffff;">{{name}}</h1>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:24px;">
                            <p style="margin:0 0 12px 0;font-size:16px;line-height:1.5;">Welcome, and thanks for signing up.</p>
                            <p style="margin:0 0 18px 0;font-size:15px;line-height:1.6;color:#4b5563;">Use this verification code to activate your account:</p>
                            <div style="margin:0 0 18px 0;padding:14px 16px;text-align:center;border:1px dashed #cbd5e1;background:#f8fafc;border-radius:10px;">
                                <span style="display:inline-block;font-size:30px;letter-spacing:8px;font-weight:700;color:#111827;">{{code}}</span>
                            </div>
                            <p style="margin:0 0 8px 0;font-size:13px;line-height:1.6;color:#6b7280;">If you did not request this code, you can safely ignore this email.</p>
                        </td>
                    </tr>
                    <tr>
                        <td style="padding:16px 24px;background:#f8fafc;border-top:1px solid #e5e7eb;">
                            <p style="margin:0;font-size:12px;color:#6b7280;">Powered by <a href="https://github.com/h3l2f/xlpanel" style="color:#0f172a;text-decoration:underline;">Xlpanel</a>.</p>
                        </td>
                    </tr>
                </table>
            </td>
        </tr>
    </table>
</body>
</html>
